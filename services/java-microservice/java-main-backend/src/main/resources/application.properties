spring.application.name=java-main-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/assetflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

security.jwt.secret=${JWT_SECRET:change-me-in-env-this-is-a-development-only-secret-key-please}
security.jwt.issuer=${JWT_ISSUER:assetflow-auth}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Also import .env as a property source (real OS environment variables always win).
spring.config.import=optional:file:.env[.properties]

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
server.port=${SERVER_PORT:8080}
server.shutdown=graceful

# ---------------------------------------------------------------------------
# Datasource
# ---------------------------------------------------------------------------
spring.datasource.url=${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/assetflow}}
spring.datasource.username=${DATABASE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=120000

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---------------------------------------------------------------------------
# Flyway
# ---------------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Baseline at 0 so V1 still runs when the schema is "non-empty" only because of
# leftover enum types from a previous run (V1 itself drops/recreates them).
spring.flyway.baseline-version=0

# ---------------------------------------------------------------------------
# Redis
# ---------------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}
spring.data.redis.timeout=10s

# ---------------------------------------------------------------------------
# Actuator
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info

# ---------------------------------------------------------------------------
# Legacy Security Properties (for compatibility)
# ---------------------------------------------------------------------------
security.jwt.secret=${JWT_SECRET:change-me-in-env-this-is-a-development-only-secret-key-please}
security.jwt.issuer=${JWT_ISSUER:assetflow-auth}

# ---------------------------------------------------------------------------
# Application Settings
# ---------------------------------------------------------------------------
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

app.jwt.secret=${JWT_SECRET}
app.jwt.issuer=${JWT_ISSUER:assetflow-auth}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}

app.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:7}

# ---------------------------------------------------------------------------
# Mailjet
# ---------------------------------------------------------------------------
app.mailjet.api-key=${mailjet.api-key:}
app.mailjet.secret-key=${mailjet.secret-key:}
app.mailjet.sender-email=${mailjet.sender-email:}
app.mailjet.sender-name=${mailjet.sender-name:AssetFlow}

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
app.security.max-failed-attempts=${MAX_FAILED_LOGIN_ATTEMPTS:5}
app.security.lock-duration-minutes=${ACCOUNT_LOCK_DURATION_MINUTES:30}
app.security.verification-token-ttl-hours=${VERIFICATION_TOKEN_TTL_HOURS:24}
app.security.reset-token-ttl-minutes=${RESET_TOKEN_TTL_MINUTES:30}
app.security.resend-cooldown-seconds=${RESEND_COOLDOWN_SECONDS:60}

# ---------------------------------------------------------------------------
# CORS
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ---------------------------------------------------------------------------
# admin/organisationsetup module compatibility.
# Its JwtService reads security.jwt.secret and its CORS reads cors.allowed-origins.
# Driven from the SAME env vars so one login/token works across both modules.
# ---------------------------------------------------------------------------
security.jwt.secret=${JWT_SECRET}
security.jwt.issuer=${JWT_ISSUER:assetflow-auth}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}